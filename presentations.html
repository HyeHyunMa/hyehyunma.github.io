<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentations | Hyehyun Ma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .notion-card:hover { transform: translateY(-4px); transition: all 0.2s ease; }
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        .citation-box { background-color: #f8fafc; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-white text-slate-800">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-lg font-bold tracking-tight text-slate-900">HYEHYUN MA</a>
            <div class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="index.html#about" class="text-slate-500 hover:text-blue-600 transition">About</a>
                <a href="index.html#education" class="text-slate-500 hover:text-blue-600 transition">Education</a>
                <a href="index.html#research" class="text-slate-500 hover:text-blue-600 transition">Research</a>
                <a href="index.html#publications" class="text-slate-500 hover:text-blue-600 transition">Publications</a>
                <a href="#" class="text-blue-600 font-bold">Presentations</a>
                <a href="index.html#cv" class="text-slate-500 hover:text-blue-600 transition">CV</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-16">
        <!-- Header -->
        <header class="mb-12">
            <div class="flex items-center gap-4 mb-4">
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Conference Presentations</h1>
            </div>
        </header>

        <!-- Tag Filter -->
        <div id="tag-container" class="flex flex-wrap gap-2 mb-12">
            <!-- JS로 자동 생성됨 -->
        </div>

        <!-- Gallery Grid -->
        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 카드들 -->
        </div>
    </main>

    <!-- Academic Modal -->
<div id="modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4">
    <div class="absolute inset-0 modal-backdrop" onclick="closeModal()"></div>
    <div class="relative bg-white w-full max-w-3xl overflow-y-auto rounded-3xl shadow-2xl p-10 md:p-12">
        <!-- Close Button -->
        <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-900 transition">
            <i class="fa-solid fa-xmark text-2xl"></i>
        </button>

        <div class="flex flex-col">
            <!-- Emoji & Title -->
            <div id="modal-emoji" class="text-5xl mb-4"></div>
            <h2 id="modal-title" class="text-2xl font-bold text-slate-900 mb-8 leading-tight"></h2>
            
            <!-- Properties List (노션 스타일) -->
            <div class="space-y-4 mb-10 border-t border-slate-100 pt-8">
                <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-6">
                    <span class="w-40 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Authors</span>
                    <p id="modal-authors" class="text-sm text-slate-700 font-semibold"></p>
                </div>
                <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-6">
                    <span class="w-40 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Date</span>
                    <p id="modal-date" class="text-sm text-slate-700"></p>
                </div>
                <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-6">
                    <span class="w-40 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Conference</span>
                    <p id="modal-conference" class="text-sm text-slate-700"></p>
                </div>
                <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-6">
                    <span class="w-40 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Location</span>
                    <p id="modal-location" class="text-sm text-slate-700"></p>
                </div>
                <div id="modal-award-container" class="hidden flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-4">
                    <span class="w-32 text-[10px] font-bold text-amber-500 uppercase tracking-[0.2em] shrink-0 pt-1">Honors</span>
                    <p id="modal-award" class="flex-1 text-sm text-amber-700 font-bold leading-relaxed"></p>
                </div>
            </div>

            <!-- Tags -->
            <div class="flex flex-wrap gap-2 mb-10" id="modal-tags"></div>

            <!-- Action Buttons -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <a id="modal-ppt" href="#" target="_blank" class="flex items-center justify-center gap-3 bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition shadow-lg text-sm">
                    <i class="fa-regular fa-file-lines"></i> View Presentation (Slides)
                </a>
                <a id="modal-session" href="#" target="_blank" class="flex items-center justify-center gap-3 bg-white border border-slate-200 text-slate-700 py-4 rounded-xl font-bold hover:bg-slate-50 transition shadow-sm text-sm">
                    <i class="fa-regular fa-file-lines"></i> View Session Schedule
                </a>
            </div>
        </div>
    </div>
</div>

    <script src="data.js"></script>
    <script>
        let currentTag = 'All';

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            const filteredData = currentTag === 'All' 
                ? presentationData 
                : presentationData.filter(item => item.tags.includes(currentTag));

            grid.innerHTML = filteredData.map(item => `
                <div onclick="openModal('${item.id}')" class="notion-card group bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition cursor-pointer">
                    <div class="aspect-[16/10] overflow-hidden border-b border-slate-50 bg-slate-50">
                        <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" onerror="this.src='https://via.placeholder.com/400x250?text=Presentation'">
                    </div>
                    <div class="p-6">
                        <div class="mb-3 text-2xl">${item.emoji}</div>
                        <h3 class="font-bold text-slate-900 leading-snug group-hover:text-blue-600 transition line-clamp-2">${item.title} ${item.award ? '<span class="text-sm ml-1">🏆</span>' : ''}</h3>
                    </div>
                </div>
            `).join('');
        }

        function renderTags() {
            const tagContainer = document.getElementById('tag-container');
            const allTags = ['All', ...new Set(presentationData.flatMap(item => item.tags))];
            
            tagContainer.innerHTML = allTags.map(tag => `
                <button onclick="filterByTag('${tag}')" 
                        class="tag-btn px-5 py-2 rounded-full text-xs font-bold transition border ${tag === currentTag ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-500 border-slate-200 hover:border-slate-400'}">
                    ${tag}
                </button>
            `).join('');
        }

        function filterByTag(tag) {
            currentTag = tag;
            renderTags();
            renderGallery();
        }

        function openModal(id) {
            const item = presentationData.find(p => p.id === id);
            if (!item) return;
        
            document.getElementById('modal-emoji').innerText = item.emoji;
            document.getElementById('modal-title').innerText = item.title;
            document.getElementById('modal-authors').innerText = item.authors || "Not specified";
            document.getElementById('modal-date').innerText = item.date || "Not specified";
            document.getElementById('modal-conference').innerText = item.conference || "Not specified";
            document.getElementById('modal-location').innerText = item.location || "Not specified";
        
            document.getElementById('modal-ppt').href = item.pptLink || "#";
            document.getElementById('modal-session').href = item.sessionPdf || "#";
            
            document.getElementById('modal-tags').innerHTML = (item.tags || []).map(tag => 
                `<span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-bold uppercase tracking-wider border border-blue-100">${tag}</span>`
            ).join('');
        
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';

                // 수상 정보 처리 (핵심!)
            const awardContainer = document.getElementById('modal-award-container');
            if (item.award) {
                awardContainer.classList.remove('hidden'); // 있으면 보이기
                document.getElementById('modal-award').innerText = item.award;
            } else {
                awardContainer.classList.add('hidden'); // 없으면 숨기기
            }

        }

        function closeModal() {
            // 1. 현재 주소창에 'id' 파라미터가 있는지 확인합니다.
            const urlParams = new URLSearchParams(window.location.search);
            const hasIdParam = urlParams.has('id');
        
            if (hasIdParam) {
                // 2. 만약 메인 페이지에서 특정 카드를 클릭해서 넘어온 상태라면,
                // 모달을 닫을 때 다시 메인 페이지의 'Presentations' 섹션으로 보냅니다.
                window.location.href = 'index.html#presentations-preview';
            } else {
                // 3. 만약 처음부터 'Presentations' 전체 목록 페이지에서 보고 있었다면,
                // 그냥 모달만 닫아서 목록을 계속 볼 수 있게 합니다.
                document.getElementById('modal').classList.add('hidden');
                document.body.style.overflow = 'auto';
            }
        }

        window.onload = () => {
            renderTags();
            renderGallery();
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
        
            if (projectId) {
                openModal(projectId);                
                // (선택사항) 모달을 닫았을 때 주소창에서 id를 깔끔하게 지우고 싶다면?
                // window.history.replaceState({}, document.title, window.location.pathname);
            }
        };
    </script>
</body>
</html>
